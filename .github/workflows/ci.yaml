name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  lint:
    name: Lint (Shellcheck)
    uses: ./.github/workflows/lint.yaml

  format:
    name: Format (shmft)
    needs: lint
    uses: ./.github/workflows/format.yaml

  unit_test:
    name: Run Test Suite
    needs: format
    uses: ./.github/workflows/unit-test.yaml

  pipeline_completion:
    name: Pipeline Completion
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Pipeline succeeded
        if: needs.unit_test.result == 'success'
        run: printf "All checks passed successfully!\n"
      - name: Pipeline failed
        if: needs.unit_test.result != 'success'
        run: |
          printf "Some checks failed, were cancelled, or skipped.\n"
          exit 1
